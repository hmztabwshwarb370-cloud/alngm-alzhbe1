<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>النجمة الذهبية | The Golden Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toastHost" class="toast-host"></div>

  <section id="loginView" class="login-view">
    <div class="login-orbit orbit-a"></div>
    <div class="login-orbit orbit-b"></div>
    <div class="login-card glass-card">
      <div class="login-logo" id="loginLogoBox"><i class="fa-solid fa-star"></i></div>
      <h1 id="loginAcademyName">أكاديمية النجمة الذهبية</h1>
      <p>نظام إدارة أكاديمية رياضية أونلاين واحترافي</p>
      <div class="field">
        <label for="loginUser">اسم المستخدم</label>
        <div class="input-icon"><i class="fa-solid fa-user"></i><input id="loginUser" autocomplete="username" placeholder="أدخل اسم المستخدم" /></div>
      </div>
      <div class="field">
        <label for="loginPass">كلمة المرور</label>
        <div class="input-icon"><i class="fa-solid fa-lock"></i><input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
      </div>
      <button class="btn btn-gold btn-block" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> دخول النظام</button>
      <div id="loginError" class="login-error"></div>
      <div class="demo-box delivery-note">
        <strong>دخول مخصص للإدارة</strong>
        <span>أدخل بيانات الحساب الممنوحة لك من مدير النظام.</span>
      </div>
    </div>
  </section>

  <main id="appView" class="app-view hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo" id="brandLogo"><i class="fa-solid fa-trophy"></i></div>
        <div class="brand-text">
          <h2 id="sideAcademyName">النجمة الذهبية</h2>
          <span>The Golden Star</span>
        </div>
      </div>
      <nav id="menu" class="menu"></nav>
      <div class="sidebar-footer">
        <button class="btn btn-outline-light btn-block" id="backupBtn"><i class="fa-solid fa-file-export"></i> نسخ احتياطي</button>
        <label class="btn btn-outline-light btn-block import-label"><i class="fa-solid fa-file-import"></i> استيراد نسخة<input id="importFile" type="file" accept="application/json" hidden></label>
        <button class="logout" id="logoutBtn"><i class="fa-solid fa-power-off"></i> تسجيل الخروج</button>
      </div>
    </aside>

    <section class="main">
      <header class="topbar">
        <button class="mobile-toggle" id="mobileToggle"><i class="fa-solid fa-bars"></i></button>
        <div>
          <h1 id="pageTitle">لوحة التحكم</h1>
          <p id="pageSubTitle">مرحباً بك في نظام إدارة أكاديمية النجمة الذهبية</p>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="quickScanBtn" title="تفقد سريع"><i class="fa-solid fa-qrcode"></i></button>
          <div class="user-chip"><i class="fa-solid fa-user-shield"></i><span id="roleName">مدير عام</span></div>
        </div>
      </header>
      <section id="content" class="content"></section>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
